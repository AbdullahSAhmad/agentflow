<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1e38; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }
    #overlay {
      position: absolute;
      top: 0;
      right: 0;
      width: 300px;
      height: 100%;
      background: rgba(18, 20, 40, 0.94);
      backdrop-filter: blur(12px);
      border-left: 1px solid rgba(255,255,255,0.06);
      color: #ccc;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 20px;
      overflow-y: auto;
      z-index: 10;
    }
    #overlay h2 {
      color: #e94560;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #overlay .agent-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    #overlay .agent-card:hover {
      background: rgba(255, 255, 255, 0.07);
    }
    #overlay .agent-card .name {
      font-weight: 600;
      font-size: 13px;
      color: #fff;
    }
    #overlay .agent-card .zone {
      color: #999;
      font-size: 12px;
      margin-top: 3px;
    }
    #overlay .agent-card .tool {
      color: #7ab8f5;
      font-size: 12px;
      margin-top: 2px;
    }
    #connection-status {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 14px;
      text-align: center;
    }
    .connected { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    .disconnected { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

    /* Zoom controls */
    /* Audio controls */
    #audio-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
    }
    #audio-controls button {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: #ccc;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      padding: 0;
      flex-shrink: 0;
    }
    #audio-controls button:hover { background: rgba(255,255,255,0.1); color: #fff; }
    #audio-controls button.muted { color: #f87171; }
    #volume-slider {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      outline: none;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4ade80;
      cursor: pointer;
      border: none;
    }
    #volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4ade80;
      cursor: pointer;
      border: none;
    }
    #volume-label { font-size: 11px; color: #666; min-width: 28px; text-align: right; }

    /* Agent Detail Panel */
    #agent-detail-panel {
      position: absolute;
      top: 0;
      right: -420px;
      width: 420px;
      height: 100%;
      background: rgba(14, 16, 32, 0.97);
      backdrop-filter: blur(16px);
      border-left: 1px solid rgba(255,255,255,0.08);
      color: #ccc;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      z-index: 20;
      transition: right 0.25s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #agent-detail-panel.open { right: 0; }
    .detail-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
    }
    #detail-close {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 28px;
      height: 28px;
      border: none;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      color: #888;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #detail-close:hover { background: rgba(255,255,255,0.12); color: #fff; }
    #detail-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .detail-role {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(74, 144, 217, 0.2);
      color: #4a90d9;
      margin-left: 6px;
      vertical-align: middle;
    }
    #detail-meta { font-size: 11px; color: #666; line-height: 1.6; }
    #detail-meta code { color: #888; background: rgba(255,255,255,0.04); padding: 1px 4px; border-radius: 3px; font-size: 11px; }
    #detail-stats {
      padding: 10px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
    }
    .stat-label { color: #666; }
    .stat-value { color: #ccc; text-align: right; }
    .tool-val { color: #7ab8f5; }
    .detail-section-title {
      padding: 10px 18px 6px;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #detail-feed {
      flex: 1;
      overflow-y: auto;
      padding: 0 18px 18px;
    }
    .feed-empty { color: #555; font-style: italic; padding: 12px 0; }
    .feed-entry {
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 12px;
      line-height: 1.5;
    }
    .feed-time {
      color: #555;
      font-size: 10px;
      font-family: monospace;
      margin-right: 6px;
    }
    .feed-icon { margin-right: 4px; }
    .feed-tool-name { color: #7ab8f5; font-weight: 500; }
    .feed-args {
      color: #666;
      font-size: 11px;
      font-family: monospace;
      margin-top: 2px;
      padding-left: 20px;
      word-break: break-all;
      max-height: 40px;
      overflow: hidden;
    }
    .feed-zone { color: #a0a0a0; }
    .feed-spawn { color: #a855f7; }
    .feed-idle { color: #6b7280; }
    .feed-shutdown { color: #f87171; }
    .feed-tokens { color: #666; }

    #overlay .agent-card { cursor: pointer; }

    /* Timeline bar */
    #timeline-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 300px; /* match overlay width */
      height: 52px;
      background: rgba(14, 16, 32, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      z-index: 10;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 0 12px;
      gap: 10px;
    }
    .timeline-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .timeline-controls button {
      height: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      padding: 0 8px;
    }
    .timeline-controls button:hover { background: rgba(255,255,255,0.1); color: #fff; }
    #timeline-play { width: 28px; padding: 0; font-size: 11px; }
    #timeline-live {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 0 10px;
    }
    #timeline-live.active {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
      border-color: rgba(74, 222, 128, 0.3);
    }
    #timeline-time {
      font-size: 11px;
      font-family: monospace;
      color: #888;
      min-width: 52px;
    }
    #timeline-speed {
      font-size: 10px;
      color: #666;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    #timeline-speed:hover { color: #ccc; }
    .timeline-track {
      flex: 1;
      height: 32px;
      cursor: pointer;
      position: relative;
    }
    #timeline-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #zoom-controls {
      position: absolute;
      bottom: 68px;
      left: 20px;
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    #zoom-controls button {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: rgba(18, 20, 40, 0.85);
      backdrop-filter: blur(8px);
      color: #ccc;
      font-size: 18px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      line-height: 1;
      padding: 0;
    }
    #zoom-controls button:hover {
      background: rgba(30, 34, 64, 0.95);
      color: #fff;
      border-color: rgba(255,255,255,0.2);
    }
    #zoom-controls button:active {
      background: rgba(40, 44, 74, 1);
    }
    #zoom-controls button svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="overlay">
      <h2>AgentFlow</h2>
      <div id="connection-status" class="disconnected">Disconnected</div>
      <div id="audio-controls">
        <button id="mute-btn" title="Toggle Sound">&#128264;</button>
        <input type="range" id="volume-slider" min="0" max="100" value="30" />
        <span id="volume-label">30%</span>
      </div>
      <div id="agent-list"></div>
    </div>
    <div id="zoom-controls">
      <button id="zoom-in" title="Zoom In">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
      <button id="zoom-out" title="Zoom Out">
        <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
      </button>
      <button id="zoom-reset" title="Fit to View">
        <svg viewBox="0 0 24 24"><path d="M3 5v4h2V5h4V3H5a2 2 0 00-2 2zm2 10H3v4a2 2 0 002 2h4v-2H5v-4zm14 4h-4v2h4a2 2 0 002-2v-4h-2v4zm0-16h-4v2h4v4h2V5a2 2 0 00-2-2z"/></svg>
      </button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
